name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: self-hosted   # используем наш локальный раннер

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

            - name: Run tests
        shell: powershell
        run: |
          .\test.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Deploy to local web server (Docker volume)
        if: success()
        shell: powershell
        run: |
          Copy-Item -Path * -Destination E:\webroot -Recurse -Force
          Write-Host "Deployment finished. Files copied to E:\webroot"